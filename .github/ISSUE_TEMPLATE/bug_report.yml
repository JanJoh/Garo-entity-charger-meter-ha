name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Integration version
      placeholder: "e.g. 1.1.8"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2024.6.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Enable debug logging and paste any errors. Settings → System → Logs, or add `logger → logs → custom_components.garo_entity_charger_meter: debug` to configuration.yaml.
      render: text
